{% extends "escola/base.html" %}

{% block content %}
<h2>Curso {{ curso.nome }}</h2>

<section>
    <article>
        <header>
            <h3>{{ curso.nome }}</h3>
            <p>Professor: {{ curso.professor.nome }}</p>
        </header>

        <section>
            <img src="{{ curso.imagem.url }}" 
                 alt="Imagem do curso {{ curso.nome }}" 
                 style="max-width: 300px; border-radius: 12px; margin-bottom: 15px;">
        </section>

        <section>
            <h4>Alunos</h4>
            <ul>
                {% for aluno in curso.alunos.all %}
                    <li>{{ aluno.nome }}</li>
                {% empty %}
                    <li>Sem alunos inscritos</li>
                {% endfor %}
            </ul>
        </section>
    </article>
</section>

{% endblock %}
