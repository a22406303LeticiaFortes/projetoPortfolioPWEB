{% extends "portfolioPWEB/base.html" %}

{% block content %}
<h2>Making Of</h2>

<section>
    {% for m in makingofs %}
    <article>
        <h3>{{ m.projeto }}</h3>
        <p>{{ m.descricao }}</p>

        {% if m.registos %}
        <img src="{{ m.registos.url }}">
        {% endif %}
    </article>
    {% endfor %}
</section>
{% endblock %}
