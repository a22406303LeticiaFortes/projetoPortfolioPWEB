{% extends "portfolioPWEB/base.html" %}

{% block content %}
<h2>Competências</h2>

{% if request.user.is_authenticated %}
    <a href="{% url 'nova_competencia' %}">
        <button>Nova Competência</button>
    </a>
{% endif %}

<section>
    {% for c in competencias %}
    <article>
        <h3>{{ c.nome }}</h3>
        <p>{{ c.descricao }}</p>

        {% if request.user.is_authenticated %}
            <a href="{% url 'edita_competencia' c.id %}">
                <button>Editar</button>
            </a>

            <a href="{% url 'apaga_competencia' c.id %}">
                <button>Apagar</button>
            </a>
        {% endif %}
    </article>
    {% endfor %}
</section>
{% endblock %}
