{% extends "portfolioPWEB/base.html" %}

{% block content %}
<div class="form-card">
    <h2>{% if formacao %}Editar{% else %}Nova{% endif %} Formação</h2>
    <form method="POST" enctype="multipart/form-data" class="styled-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top: 30px;">
            <button type="submit" class="btn-save">Guardar Formação</button>
            <a href="{% url 'formacoes' %}" class="btn-cancel">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
