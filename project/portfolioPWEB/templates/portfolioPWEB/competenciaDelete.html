{% extends "portfolioPWEB/base.html" %}

{% block content %}
<section style="display: flex; justify-content: center;">
    <article style="text-align: center; max-width: 500px;">
        <h3 style="color: #ef4444;">⚠️ Confirmar Eliminação</h3>
        <p>Leticia, tens a certeza que queres apagar <strong>"{{ competencia.nome }}"</strong>?</p>
        <br>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" style="background: #ef4444; border: none; color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer;">Sim, apagar</button>
            <a href="{% url 'competencias' %}" style="margin-left: 15px; color: var(--text-dim); text-decoration: none;">Cancelar</a>
        </form>
    </article>
</section>
{% endblock %}
