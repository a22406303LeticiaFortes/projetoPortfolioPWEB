{% extends "portfolioPWEB/base.html" %}
{% block title %}Apagar Formação | Leticia{% endblock %}

{% block content %}
<div class="delete-box">
    <h2>Apagar Formação</h2>
    <p>Tens a certeza que queres eliminar <strong>"{{ formacao.nome }}"</strong>? Esta ação é irreversível.</p>
    <form method="POST" class="delete-form">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sim, apagar</button>
        <a href="{% url 'painel' %}" class="btn btn-outline">Cancelar</a>
    </form>
</div>
{% endblock %}
